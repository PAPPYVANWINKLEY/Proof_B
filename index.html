<style>
* { margin:0; padding:0; box-sizing:border-box; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }

body {
  background:#0d0d0d; color:#e0e0e0;
  font-family:'Noto Sans KR','Pretendard',sans-serif;
  min-height:100vh;
}

/* ===== HEADER ===== */
.header {
  padding:60px 24px 40px; text-align:center;
  border-bottom:1px solid #1a1a1a;
  background:linear-gradient(180deg,#111,#0d0d0d);
}
.header h1 {
  font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,8vw,80px);
  letter-spacing:12px; color:#fff; line-height:1;
  text-shadow:0 0 60px rgba(155,107,61,0.15);
}
.header .sub {
  font-family:'JetBrains Mono',monospace; font-size:11px;
  color:#555; letter-spacing:6px; margin-top:12px; text-transform:uppercase;
}
.header .desc {
  max-width:560px; margin:24px auto 0; font-size:13px;
  color:#777; line-height:1.8;
}

/* ===== CHARACTER NAV ===== */
.char-nav {
  display:flex; gap:4px; padding:16px 24px;
  overflow-x:auto; border-bottom:1px solid #1a1a1a;
  background:#0f0f0f; justify-content:center; flex-wrap:wrap;
}
.char-btn {
  padding:10px 20px; border:none; cursor:pointer;
  border-radius:4px; font-size:13px; transition:all 0.2s;
  font-family:'JetBrains Mono',monospace; font-weight:500;
  background:transparent; color:#666; border-bottom:2px solid transparent;
}
.char-btn.active { color:var(--accent); background:var(--color-bg); border-bottom-color:var(--accent); }
.char-btn .code { font-size:10px; opacity:0.5; margin-right:6px; }

/* ===== MAIN ===== */
.main { padding:32px 24px; max-width:1000px; margin:0 auto; }

/* ===== PROFILE ===== */
.profile { display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; animation:fadeUp 0.4s ease; }
.profile-img {
  width:120px; height:90px; border-radius:6px; overflow:hidden;
  flex-shrink:0; background:#1a1a1a;
}
.profile-img img { width:100%; height:100%; object-fit:cover; }
.profile-info { flex:1; min-width:240px; }
.profile-name {
  font-family:'Bebas Neue',sans-serif; font-size:36px;
  color:var(--accent); letter-spacing:3px; line-height:1;
}
.profile-role {
  font-family:'JetBrains Mono',monospace; font-size:11px;
  color:#555; margin-top:4px;
}
.profile-desc { font-size:13px; color:#888; margin-top:12px; line-height:1.7; }
.tags { display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; }
.tag {
  font-size:10px; padding:3px 8px; border-radius:3px;
  background:var(--color-bg); color:var(--accent);
  font-family:'JetBrains Mono',monospace;
}

/* ===== CATEGORY TABS ===== */
.cat-bar {
  display:flex; gap:4px; margin-top:32px;
  border-bottom:1px solid #1a1a1a; align-items:center; flex-wrap:wrap;
}
.cat-btn {
  padding:8px 16px; border:none; cursor:pointer;
  font-size:12px; transition:all 0.2s;
  background:transparent; color:#555;
  border-radius:4px 4px 0 0; border-bottom:2px solid transparent;
  font-family:'Noto Sans KR',sans-serif;
}
.cat-btn.active { background:#1a1a1a; color:#ddd; border-bottom-color:var(--accent); }
.cat-btn .cnt {
  font-size:10px; margin-left:4px; opacity:0.4;
  font-family:'JetBrains Mono',monospace;
}
.spacer { flex:1; }
.nsfw-toggle { display:flex; align-items:center; gap:6px; padding:4px 8px; cursor:pointer; user-select:none; }
.nsfw-toggle span { font-size:11px; color:#555; font-family:'JetBrains Mono',monospace; }
.toggle-track {
  width:32px; height:18px; border-radius:9px; background:#2a2a2a;
  position:relative; transition:background 0.2s; cursor:pointer;
}
.toggle-track.on { background:#8B4513; }
.toggle-thumb {
  width:14px; height:14px; border-radius:7px; background:#ddd;
  position:absolute; top:2px; left:2px; transition:left 0.2s;
}
.toggle-track.on .toggle-thumb { left:16px; }

/* ===== IMAGE GRID ===== */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:8px; margin-top:16px;
}
.card {
  position:relative; cursor:pointer; overflow:hidden;
  border-radius:6px; background:#1a1a1a;
}
.card-ratio { padding-bottom:75%; position:relative; } /* 4:3 가로비율 */
.card img {
  position:absolute; top:0; left:0; width:100%; height:100%;
  object-fit:cover; opacity:0; transition:opacity 0.4s ease;
}
.card img.loaded { opacity:1; }
.card .spinner {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:24px; height:24px; border:2px solid #333; border-top-color:#666;
  border-radius:50%; animation:spin 0.8s linear infinite;
}
.card .error-msg {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:#555; font-size:12px;
}
.card .overlay {
  position:absolute; bottom:0; left:0; right:0; padding:8px 10px;
  background:linear-gradient(transparent,rgba(0,0,0,0.85));
  transform:translateY(100%); transition:transform 0.25s ease;
}
.card:hover .overlay { transform:translateY(0); }
.overlay .code-label { font-size:11px; color:#aaa; font-family:'JetBrains Mono',monospace; }
.overlay .desc-label { font-size:12px; color:#ddd; margin-top:2px; }

/* ===== STATS ===== */
.stats {
  margin-top:40px; padding:20px; background:#111;
  border-radius:6px; display:flex; justify-content:space-around;
  flex-wrap:wrap; gap:16px;
}
.stat { text-align:center; min-width:80px; }
.stat-num { font-family:'Bebas Neue',sans-serif; font-size:28px; }
.stat-label { font-size:10px; color:#555; font-family:'JetBrains Mono',monospace; }

/* ===== FOOTER ===== */
.footer {
  padding:40px 24px; text-align:center;
  border-top:1px solid #1a1a1a; margin-top:40px;
}
.footer h2 { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:6px; color:#333; }
.footer p { font-size:11px; color:#333; margin-top:8px; font-family:'JetBrains Mono',monospace; }

/* ===== LIGHTBOX ===== */
.lightbox {
  display:none; position:fixed; inset:0; z-index:9999;
  background:rgba(0,0,0,0.92); align-items:center; justify-content:center;
  cursor:zoom-out; backdrop-filter:blur(8px);
}
.lightbox.open { display:flex; }
.lightbox img { max-width:90vw; max-height:90vh; object-fit:contain; border-radius:8px; }
.lightbox .hint {
  position:absolute; top:20px; right:24px; color:#888;
  font-size:14px; font-family:'JetBrains Mono',monospace;
}

@keyframes spin { to { transform:rotate(360deg); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

/* ===== STORY TOGGLE ===== */
.story-toggle {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:14px; padding:6px 14px; border:1px solid #222;
  border-radius:4px; background:transparent; color:#666;
  font-size:11px; cursor:pointer; transition:all 0.2s;
  font-family:'JetBrains Mono',monospace;
}
.story-toggle:hover { border-color:#444; color:#aaa; }
.story-toggle .arrow { transition:transform 0.3s; display:inline-block; font-size:9px; }
.story-toggle.open .arrow { transform:rotate(90deg); }
.story-box {
  max-height:0; overflow:hidden; transition:max-height 0.4s ease, opacity 0.3s ease;
  opacity:0; margin-top:0;
}
.story-box.open { max-height:5000px; opacity:1; margin-top:16px; }
.story-content {
  font-size:13px; color:#777; line-height:2; padding:20px 24px;
  background:#111; border-radius:6px; border-left:2px solid var(--accent);
  white-space:pre-line;
}
.story-content .story-char-name {
  font-size:16px; font-weight:700; color:var(--accent); 
  letter-spacing:1px; display:block; margin-bottom:8px;
}

/* ===== MUSIC PLAYER ===== */
.player {
  position:fixed; bottom:0; left:0; right:0; z-index:999;
  background:rgba(13,13,13,0.95); backdrop-filter:blur(12px);
  border-top:1px solid #1a1a1a; padding:10px 20px;
  display:flex; align-items:center; gap:12px;
  font-family:'JetBrains Mono',monospace;
}
.player-btn {
  width:36px; height:36px; border-radius:50%; border:1px solid #333;
  background:transparent; color:#888; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; font-size:14px;
}
.player-btn:hover { border-color:#666; color:#ddd; }
.player-btn.playing { border-color:#9B6B3D; color:#C4915A; }
.player-info { flex:1; min-width:0; }
.player-title { font-size:11px; color:#888; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.player-bar { display:flex; align-items:center; gap:8px; margin-top:4px; }
.player-time { font-size:10px; color:#444; flex-shrink:0; }
.player-track { flex:1; height:3px; background:#1a1a1a; border-radius:2px; cursor:pointer; position:relative; }
.player-progress { height:100%; background:#9B6B3D; border-radius:2px; width:0%; transition:width 0.1s linear; }
.player-vol { width:60px; height:3px; background:#1a1a1a; border-radius:2px; cursor:pointer; position:relative; flex-shrink:0; }
.player-vol-fill { height:100%; background:#555; border-radius:2px; width:70%; }
.player-vol-icon { font-size:12px; color:#555; cursor:pointer; flex-shrink:0; }
.footer { padding-bottom:80px !important; }

/* ===== MOBILE ===== */
@media (max-width:600px) {
  .header { padding:40px 16px 28px; }
  .header h1 { letter-spacing:6px; }
  .header .sub { letter-spacing:3px; font-size:9px; }
  .char-nav { padding:12px 12px; gap:2px; }
  .char-btn { padding:8px 12px; font-size:11px; }
  .main { padding:20px 12px; }
  .profile { gap:16px; }
  .profile-img { width:80px; height:60px; }
  .profile-name { font-size:24px; letter-spacing:2px; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:6px; }
  .cat-bar { gap:2px; }
  .cat-btn { padding:6px 10px; font-size:11px; }
  .stats { padding:16px 12px; gap:12px; }
  .stat-num { font-size:22px; }
  .player { padding:8px 12px; gap:8px; }
  .player-vol, .player-vol-icon { display:none; }
  .card .overlay { transform:translateY(0); background:linear-gradient(transparent 40%,rgba(0,0,0,0.75)); }
}
</style>

/* ========== 여기서부터는 건드리지 않아도 됩니다 ========== */

let currentChar = "C";
let currentCat = "일상";
let nsfwOn = false;

function getChar(id) { return DATA.find(c => c.id === id); }

function renderCharNav() {
  const nav = document.getElementById("charNav");
  nav.innerHTML = DATA.map(c => 
    `<button class="char-btn ${c.id===currentChar?'active':''}" 
      onclick="selectChar('${c.id}')"
      style="--accent:${c.accent};--color-bg:${c.color}22">
      <span class="code">${c.id}</span>${c.nameKr}
    </button>`
  ).join("");
}

function renderMain() {
  const c = getChar(currentChar);
  document.documentElement.style.setProperty("--accent", c.accent);
  document.documentElement.style.setProperty("--color-bg", c.color + "22");

  const cats = c.categories.filter(cat => cat.label !== "NSFW" || nsfwOn);
  if (!cats.find(cat => cat.label === currentCat)) currentCat = cats[0]?.label || "일상";
  const activeCat = cats.find(cat => cat.label === currentCat) || cats[0];

  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="profile">
      <div class="profile-img"><img src="${BASE}/${c.id}/01.webp" alt="${c.name}"></div>
      <div class="profile-info">
        <div class="profile-name" style="color:${c.accent}">${c.name}</div>
        <div class="profile-role">${c.role} · ${c.codename}</div>
        <div class="profile-desc">${c.desc}</div>
        <div class="tags">${c.tags.split(" · ").map(t => `<span class="tag" style="background:${c.color}18;color:${c.accent}">${t}</span>`).join("")}</div>
        ${c.story ? `<button class="story-toggle" onclick="toggleStory(this)"><span class="arrow">▶</span> STORY</button>` : ""}
      </div>
    </div>
    ${c.story ? `<div class="story-box" id="storyBox"><div class="story-content">${c.story.replace(/^([가-힣]+\s?[가-힣]*\s*\/\s*[A-Za-z][A-Za-z\s.]+)$/gm, '<span class="story-char-name">$1</span>')}</div></div>` : ""}
    <div class="cat-bar">
      ${cats.map(cat => `
        <button class="cat-btn ${cat.label===currentCat?'active':''}" 
          onclick="selectCat('${cat.label}')"
          style="--accent:${c.accent}">
          ${cat.label}<span class="cnt">${cat.codes.length}</span>
        </button>
      `).join("")}
      <div class="spacer"></div>
      <div class="nsfw-toggle" onclick="toggleNsfw()">
        <div class="toggle-track ${nsfwOn?'on':''}"><div class="toggle-thumb"></div></div>
        <span>18+</span>
      </div>
    </div>
    <div class="grid">
      ${activeCat ? activeCat.codes.map((item,i) => `
        <div class="card" onclick="openLightbox('${BASE}/${c.id}/${item.c}.webp')" style="animation:fadeUp 0.3s ease ${i*0.03}s both">
          <div class="card-ratio">
            <div class="spinner" id="sp-${c.id}-${item.c}"></div>
            <img 
              src="${BASE}/${c.id}/${item.c}.webp" 
              alt="${c.id}/${item.c}"
              onload="this.classList.add('loaded');document.getElementById('sp-${c.id}-${item.c}').style.display='none';"
              onerror="this.style.display='none';document.getElementById('sp-${c.id}-${item.c}').outerHTML='<div class=error-msg>No Image</div>';"
            >
            <div class="overlay">
              <div class="code-label">${c.id}/${item.c}</div>
              <div class="desc-label">${item.t}</div>
            </div>
          </div>
        </div>
      `).join("") : ""}
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num" style="color:#C4915A">77</div><div class="stat-label">케일럽</div></div>
      <div class="stat"><div class="stat-num" style="color:#B8976A">75</div><div class="stat-label">엘리</div></div>
      <div class="stat"><div class="stat-num" style="color:#CD6839">80</div><div class="stat-label">잭</div></div>
      <div class="stat"><div class="stat-num" style="color:#8FA3B8">78</div><div class="stat-label">아드리앙</div></div>
      <div class="stat"><div class="stat-num" style="color:#B48EDA">79</div><div class="stat-label">마커스</div></div>
      <div class="stat"><div class="stat-num" style="color:#7B8FA1">80</div><div class="stat-label">미하일</div></div>
      <div class="stat"><div class="stat-num" style="color:#fff">469</div><div class="stat-label">TOTAL</div></div>
    </div>
  `;
}

function selectChar(id) { currentChar = id; renderCharNav(); renderMain(); }
function selectCat(label) { currentCat = label; renderMain(); }
function toggleNsfw() { nsfwOn = !nsfwOn; renderMain(); }
function toggleStory(btn) { btn.classList.toggle("open"); document.getElementById("storyBox").classList.toggle("open"); }
function openLightbox(src) { document.getElementById("lb-img").src = src; document.getElementById("lightbox").classList.add("open"); }
function closeLightbox() { document.getElementById("lightbox").classList.remove("open"); }
document.addEventListener("keydown", e => { if(e.key==="Escape") closeLightbox(); });

renderCharNav();
renderMain();

/* ===== MUSIC PLAYER ===== */
const audio = document.getElementById("bgm");
const playBtn = document.getElementById("playBtn");
const pProgress = document.getElementById("pProgress");
const pCurrent = document.getElementById("pCurrent");
const pDuration = document.getElementById("pDuration");
const pVol = document.getElementById("pVol");

function fmt(s) { const m = Math.floor(s/60); return m + ":" + String(Math.floor(s%60)).padStart(2,"0"); }

function startPlaying() { playBtn.textContent = "❚❚"; playBtn.classList.add("playing"); }
function stopPlaying() { playBtn.textContent = "▶"; playBtn.classList.remove("playing"); }

function togglePlay() {
  if (audio.paused) { audio.play().then(startPlaying).catch(()=>{}); }
  else { audio.pause(); stopPlaying(); }
}

// 자동재생 시도 — 브라우저가 차단하면 첫 클릭/터치 시 재생
audio.play().then(startPlaying).catch(() => {
  function autoplayOnInteract() {
    audio.play().then(startPlaying).catch(()=>{});
    document.removeEventListener("click", autoplayOnInteract);
    document.removeEventListener("touchstart", autoplayOnInteract);
  }
  document.addEventListener("click", autoplayOnInteract);
  document.addEventListener("touchstart", autoplayOnInteract);
});
audio.addEventListener("timeupdate", () => {
  if (audio.duration) {
    pProgress.style.width = (audio.currentTime / audio.duration * 100) + "%";
    pCurrent.textContent = fmt(audio.currentTime);
  }
});
audio.addEventListener("loadedmetadata", () => { pDuration.textContent = fmt(audio.duration); });
function seekAudio(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
}
function setVolume(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const v = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.volume = v; pVol.style.width = (v*100) + "%";
}
function toggleMute() {
  audio.muted = !audio.muted;
  document.querySelector(".player-vol-icon").textContent = audio.muted ? "✕" : "♪";
}
</script>
